<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandeep K Nayak — Nexus Directory</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff0055;
            --neon-yellow: #fcee0a;
            --terminal-dark: #03070d;
            --panel-bg: rgba(5, 11, 22, 0.85);
            --cyber-border: rgba(0, 240, 255, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--terminal-dark);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Scanline Background Grid */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(255, 0, 85, 0.01) 2px, transparent 2px);
            background-size: 25px 25px, 25px 25px, 100% 4px;
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
        }

        /* Global Scanline Overlay Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
        }

        .hub-container {
            width: 100%;
            max-width: 380px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 4px; /* Hard, geometric cyberpunk cuts */
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15), inset 0 0 20px rgba(0, 240, 255, 0.1);
            position: relative;
            z-index: 2;
            backdrop-filter: blur(8px);
        }

        /* Tech corner accents */
        .hub-container::before {
            content: 'NEXUS_v4.26';
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--terminal-dark);
            padding: 0 8px;
            font-size: 10px;
            color: var(--neon-yellow);
            letter-spacing: 2px;
            border-left: 2px solid var(--neon-yellow);
        }

        .profile-avatar-wrapper {
            width: 110px;
            height: 110px;
            margin: 0 auto 24px;
            position: relative;
            background: var(--terminal-dark);
            border: 1px solid var(--neon-magenta);
            padding: 4px;
        }

        /* Corner bracket accents for the photo frame */
        .profile-avatar-wrapper::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; width: 16px; height: 16px;
            border-top: 3px solid var(--neon-cyan);
            border-left: 3px solid var(--neon-cyan);
        }
        .profile-avatar-wrapper::after {
            content: '';
            position: absolute;
            bottom: -4px; right: -4px; width: 16px; height: 16px;
            border-bottom: 3px solid var(--neon-cyan);
            border-right: 3px solid var(--neon-cyan);
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: saturate(1.4) contrast(1.1) hue-rotate(-10deg);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        .identity-block h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .identity-block p {
            font-size: 11px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 4px;
            margin-bottom: 36px;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
        }

        .links-vector {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hyper-link-node {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            background: rgba(0, 240, 255, 0.02);
            border: 1px solid var(--cyber-border);
            color: #c4d1ec;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        /* Diagonal geometric corner slice cut */
        .hyper-link-node::before {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 0; height: 0;
            border-style: solid;
            border-width: 0 0 8px 8px;
            border-color: transparent transparent var(--neon-cyan) transparent;
            transition: all 0.2s ease;
        }

        .hyper-link-node:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-cyan);
            color: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            text-shadow: 0 0 5px #fff;
        }

        /* Custom color accent variants for distinct portals */
        .hyper-link-node.instagram-node {
            border-color: rgba(255, 0, 85, 0.3);
        }
        .hyper-link-node.instagram-node::before {
            border-color: transparent transparent var(--neon-magenta) transparent;
        }
        .hyper-link-node.instagram-node:hover {
            background: rgba(255, 0, 85, 0.1);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        .hyper-link-node.primary-node {
            background: rgba(252, 238, 10, 0.03);
            border-color: rgba(252, 238, 10, 0.3);
            color: var(--neon-yellow);
            margin-top: 10px;
        }
        .hyper-link-node.primary-node::before {
            border-color: transparent transparent var(--neon-yellow) transparent;
        }
        .hyper-link-node.primary-node:hover {
            background: var(--neon-yellow);
            color: #000;
            box-shadow: 0 0 20px rgba(252, 238, 10, 0.5);
            text-shadow: none;
        }

        .status-tag {
            font-size: 9px;
            padding: 2px 6px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: var(--neon-cyan);
        }
        .instagram-node .status-tag {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid rgba(255, 0, 85, 0.3);
            color: var(--neon-magenta);
        }
        .primary-node .status-tag {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(252, 238, 10, 0.5);
            color: var(--neon-yellow);
        }
        .primary-node:hover .status-tag {
            border-color: #000;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <div class="profile-avatar-wrapper">
            <img src="profile.jpeg.jpeg" alt="Sandeep K Nayak" class="profile-avatar">
        </div>

        <div class="identity-block">
            <h1>Sandeep K Nayak</h1>
            <p>// IDENTITY_SYSTEM</p>
        </div>

        <div class="links-vector">
            <!-- Instagram Link handles both App deep link redirect and web backup securely -->
            <a href="instagram://user?username=sandeep.k.n77" onclick="window.open('https://instagram.com/sandeep.k.n77', '_blank');" class="hyper-link-node instagram-node">
                <span>[01] Instagram</span>
                <span class="status-tag">ONLINE</span>
            </a>
            
            <a href="https://linkedin.com/" target="_blank" class="hyper-link-node">
                <span>[02] LinkedIn</span>
                <span class="status-tag">CONNECT</span>
            </a>
            
            <a href="https://github.com/sandykn78-create" target="_blank" class="hyper-link-node">
                <span>[03] GitHub Core</span>
                <span class="status-tag">REPOS</span>
            </a>
            
            <a href="index.html" class="hyper-link-node primary-node">
                <span>↺ RETURN TO TOKEN</span>
                <span class="status-tag">SYS.EXEC</span>
            </a>
        </div>
    </div>

</body>
</html>
