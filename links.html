<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandeep K Nayak — Nexus Terminal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff0055;
            --neon-yellow: #fcee0a;
            --terminal-dark: #050811;
            --panel-bg: rgba(7, 13, 26, 0.85);
            --cyber-border: rgba(0, 240, 255, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--terminal-dark);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* ANIMATED FEATURE 1: Moving Neon Matrix Grid Background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 200%;
            background: 
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
            animation: gridScroll 16s linear infinite;
        }

        @keyframes gridScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* ANIMATED FEATURE 2: CRT Scanline Noise Overlay */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 99;
            background-size: 100% 4px;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        /* ANIMATED FEATURE 3: System Boot-up Glitch Intro */
        .hub-container {
            width: 100%;
            max-width: 380px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 2px;
            padding: 40px 24px 24px;
            text-align: center;
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
            position: relative;
            z-index: 2;
            backdrop-filter: blur(12px);
            animation: terminalBoot 0.6s cubic-bezier(0.15, 0.85, 0.3, 1) both;
        }

        @keyframes terminalBoot {
            0% { transform: scaleY(0.005) scaleX(0); opacity: 0; filter: brightness(3); }
            50% { transform: scaleY(0.005) scaleX(1); opacity: 1; filter: brightness(2); }
            100% { transform: scaleY(1) scaleX(1); opacity: 1; filter: brightness(1); }
        }

        .hub-container::before {
            content: 'SYS_NEXUS // ONLINE';
            position: absolute;
            top: -11px;
            left: 16px;
            background: var(--terminal-dark);
            padding: 0 8px;
            font-size: 11px;
            color: var(--neon-yellow);
            letter-spacing: 2px;
            border-left: 2px solid var(--neon-yellow);
        }

        /* Profile frame with animated scanner overlay */
        .profile-avatar-wrapper {
            width: 110px;
            height: 110px;
            margin: 0 auto 24px;
            position: relative;
            background: #020408;
            border: 1px solid var(--neon-magenta);
            padding: 4px;
            overflow: hidden;
        }

        /* ANIMATED FEATURE 4: Laser Scanline moving down the profile picture */
        .profile-avatar-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: laserScan 3s linear infinite;
        }

        @keyframes laserScan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: saturate(1.2) contrast(1.15) brightness(0.95);
        }

        .identity-block h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
        }

        .identity-block p {
            font-size: 11px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 4px;
            margin-bottom: 32px;
        }

        .links-vector {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* UI/UX IMPROVEMENT: Cyberpunk Interactive Nodes */
        .hyper-link-node {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(0, 240, 255, 0.02);
            border: 1px solid var(--cyber-border);
            color: #94a3b8;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .hyper-link-node::before {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 0; height: 0;
            border-style: solid;
            border-width: 0 0 8px 8px;
            border-color: transparent transparent var(--neon-cyan) transparent;
        }

        /* ANIMATED FEATURE 5: Micro-Glitch Tilt Effect on Hover */
        .hyper-link-node:hover {
            background: rgba(0, 240, 255, 0.08);
            border-color: var(--neon-cyan);
            color: #fff;
            transform: translateX(4px);
            box-shadow: -4px 0 0 var(--neon-cyan), 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .hyper-link-node.instagram-node {
            border-color: rgba(255, 0, 85, 0.3);
        }
        .hyper-link-node.instagram-node::before {
            border-color: transparent transparent var(--neon-magenta) transparent;
        }
        .hyper-link-node.instagram-node:hover {
            background: rgba(255, 0, 85, 0.08);
            border-color: var(--neon-magenta);
            box-shadow: -4px 0 0 var(--neon-magenta), 0 0 15px rgba(255, 0, 85, 0.25);
        }

        .hyper-link-node.primary-node {
            background: rgba(252, 238, 10, 0.02);
            border-color: rgba(252, 238, 10, 0.25);
            color: var(--neon-yellow);
            margin-top: 8px;
        }
        .hyper-link-node.primary-node::before {
            border-color: transparent transparent var(--neon-yellow) transparent;
        }
        .hyper-link-node.primary-node:hover {
            background: var(--neon-yellow);
            color: #000;
            box-shadow: 0 0 20px rgba(252, 238, 10, 0.4);
        }

        .status-tag {
            font-size: 9px;
            padding: 2px 6px;
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: var(--neon-cyan);
            transition: all 0.2s;
        }
        .instagram-node .status-tag {
            color: var(--neon-magenta);
            border-color: rgba(255, 0, 85, 0.2);
        }
        .primary-node .status-tag {
            color: var(--neon-yellow);
            border-color: rgba(252, 238, 10, 0.2);
        }
        .hyper-link-node:hover .status-tag {
            background: #fff;
            color: #000;
            border-color: #fff;
        }
        .primary-node:hover .status-tag {
            background: #000;
            color: var(--neon-yellow);
            border-color: #000;
        }

        /* ANIMATED FEATURE 6: Typing Diagnostic Status Ticker at Bottom */
        .system-ticker {
            margin-top: 28px;
            font-size: 10px;
            color: #4b5d78;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px dashed rgba(255, 255, 255, 0.05);
            padding-top: 16px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ticker-dot {
            width: 5px;
            height: 5px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 8px var(--neon-cyan); }
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <div class="profile-avatar-wrapper">
            <img src="profile.jpeg.jpeg" alt="Sandeep K Nayak" class="profile-avatar">
        </div>

        <div class="identity-block">
            <h1>Sandeep K Nayak</h1>
            <p>// NODE_ROUTING_ONLINE</p>
        </div>

        <div class="links-vector">
            <!-- Fixed App-Launch and Direct Browser Fallback Logic Combo -->
            <a href="instagram://user?username=sandeep.k.n77" onclick="window.open('https://instagram.com/sandeep.k.n77', '_blank');" class="hyper-link-node instagram-node">
                <span>[01] Instagram Portal</span>
                <span class="status-tag">LAUNCH</span>
            </a>
            
            <a href="https://linkedin.com/" target="_blank" class="hyper-link-node">
                <span>[02] LinkedIn Database</span>
                <span class="status-tag">SECURE</span>
            </a>
            
            <a href="https://github.com/sandykn78-create" target="_blank" class="hyper-link-node">
                <span>[03] GitHub Repositories</span>
                <span class="status-tag">CORE</span>
            </a>
            
            <a href="index.html" class="hyper-link-node primary-node">
                <span>↺ RESTORE IDENTITY TOKEN</span>
                <span class="status-tag">BACK</span>
            </a>
        </div>

        <!-- System Status Line Footer -->
        <div class="system-ticker">
            <span class="ticker-dot"></span>
            <span>SECURE_LINK: ALL COMPONENT STREAMS FULLY OPERATIONAL</span>
        </div>
    </div>

</body>
</html>
