<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandeep K Nayak — Portals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #06080a;
            color: #f7f9fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .hub-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #dcae5b;
            margin-bottom: 16px;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .username {
            font-family: 'Space Mono', monospace;
            color: #dcae5b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .link-card {
            background: #13171c;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .link-card:hover {
            background: rgba(220, 174, 91, 0.1);
            border-color: #dcae5b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="hub-container">
        <img src="profile.jpeg" alt="Sandeep K Nayak" class="profile-img">
        <h1>Sandeep K Nayak</h1>
        <div class="username">@sandykn78-create</div>
        
        <div class="links-wrapper">
            <a href="https://www.linkedin.com/in/sandeep-k-nayak-696368282" target="_blank" class="link-card">LINKEDIN</a>
            <a href="https://github.com/sandykn78-create" target="_blank" class="link-card">GITHUB</a>
            <a href="https://instagram.com" target="_blank" class="link-card">INSTAGRAM</a>
        </div>
    </div>
</body>
</html>
