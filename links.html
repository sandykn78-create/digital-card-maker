<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandeep K Nayak — Connect Directory</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-gold: #dcae5b;
            --dark-base: #0a0d10;
            --light-base: #f7f9fb;
            --card-bg: #13171c;
            --border-alpha: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #06080a;
            color: var(--light-base);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Ambient grid pattern matching main index page */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
        }

        .hub-container {
            width: 100%;
            max-width: 360px;
            background: linear-gradient(160deg, #13171c 0%, #080a0d 100%);
            border: 1px solid var(--border-alpha);
            border-radius: 24px;
            padding: 36px 24px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 2;
        }

        .profile-avatar-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--accent-gold), transparent);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(20%);
            background: #101419;
        }

        .identity-block h1 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .identity-block p {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 32px;
        }

        .links-vector {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .hyper-link-node {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: #94a3b8;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .hyper-link-node:hover {
            background: rgba(220, 174, 91, 0.06);
            border-color: rgba(220, 174, 91, 0.4);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Specific style for primary back-to-card token option */
        .hyper-link-node.primary-node {
            background: rgba(220, 174, 91, 0.08);
            border-color: rgba(220, 174, 91, 0.3);
            color: var(--accent-gold);
        }
        .hyper-link-node.primary-node:hover {
            background: var(--accent-gold);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <div class="profile-avatar-wrapper">
            <!-- FIXED: points to your profile.jpeg.jpeg file extension -->
            <img src="profile.jpeg.jpeg" alt="Sandeep K Nayak" class="profile-avatar">
        </div>

        <div class="identity-block">
            <h1>Sandeep K Nayak</h1>
            <p>System Routing Map</p>
        </div>

        <div class="links-vector">
            <!-- Added your active Instagram configuration link -->
            <a href="https://instagram.com/@sandeep.k.n77" target="_blank" class="hyper-link-node">Instagram Portal</a>
            <a href="https://linkedin.com/" target="_blank" class="hyper-link-node">LinkedIn Gateway</a>
            <a href="https://github.com/sandykn78-create" target="_blank" class="hyper-link-node">GitHub Environment</a>
            <a href="index.html" class="hyper-link-node primary-node">↺ Return to Identity Token</a>
        </div>
    </div>

</body>
</html>
