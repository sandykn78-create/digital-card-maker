<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandeep K Nayak — Portfolio Card</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 0%, #1a1f2c 0%, #0e1118 100%);
            --accent-glow: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* MODERN FEATURE 1: Smooth, moving ambient glass orbs in background */
        .ambient-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--accent-glow);
            filter: blur(120px);
            opacity: 0.15;
            z-index: 1;
            animation: drift 12s ease-in-out infinite alternate;
        }
        
        @keyframes drift {
            0% { transform: translate(-10%, -20%) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.1); }
        }

        /* MODERN FEATURE 2: Fluid Card Reveal Animation */
        .premium-card {
            width: 100%;
            max-width: 350px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 32px 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 2;
            text-align: center;
            position: relative;
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Smooth image circle with a modern premium offset gradient frame */
        .avatar-container {
            width: 105px;
            height: 105px;
            margin: 0 auto 20px;
            position: relative;
        }

        .avatar-frame {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--accent-glow);
            padding: 3px;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.25);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #131722;
            display: block;
        }

        /* UX INTERACTION: Micro-rotation on avatar frame when card is hovered */
        .premium-card:hover .avatar-frame {
            transform: scale(1.04) rotate(5deg);
        }

        .profile-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-title {
            font-size: 13px;
            font-weight: 500;
            color: #818cf8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
        }

        /* MODERN FEATURE 3: Balanced, scannable minimalist metrics block */
        .stats-row {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 14px 10px;
            margin-bottom: 28px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-lbl {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* MODERN FEATURE 4: Liquid Glass Action Buttons */
        .action-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 15px 20px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-primary {
            background: var(--text-primary);
            color: #0e1118;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.05);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 255, 255, 0.12);
            background: #ffffff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Ambient glowing light source behind the architecture -->
    <div class="ambient-orb"></div>

    <div class="premium-card">
        <div class="avatar-container">
            <div class="avatar-frame">
                <img src="profile.jpeg.jpeg" alt="Sandeep K Nayak" class="avatar-image">
            </div>
        </div>

        <h1 class="profile-name">Sandeep K Nayak</h1>
        <div class="profile-title">Developer & Designer</div>

        <!-- Clean, Modern UI Metrics Feature Block -->
        <div class="stats-row">
            <div class="stat-item">
                <span class="stat-val">Active</span>
                <span class="stat-lbl">Status</span>
            </div>
            <div class="stat-item">
                <span class="stat-val">Creative</span>
                <span class="stat-lbl">Focus</span>
            </div>
            <div class="stat-item">
                <span class="stat-val">Global</span>
                <span class="stat-lbl">Reach</span>
            </div>
        </div>

        <!-- Sleek High-UX Action Elements -->
        <div class="action-container">
            <a href="links.html" class="btn btn-primary">Connect Directory</a>
            <a href="https://github.com/sandykn78-create" target="_blank" class="btn btn-secondary">View Repositories</a>
        </div>
    </div>

</body>
</html>
